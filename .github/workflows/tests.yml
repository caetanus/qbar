name: tests

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

jobs:
  debian:
    name: Debian stable (Qt 6, full feature set)
    runs-on: ubuntu-latest
    container: debian:trixie
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ca-certificates meson ninja-build cmake pkg-config g++ python3 \
            qt6-base-dev qt6-base-private-dev \
            qt6-declarative-dev qt6-declarative-private-dev \
            qt6-svg-dev qt6-websockets-dev \
            qt6-wayland-dev qt6-wayland-private-dev \
            qt6-tools-dev-tools qt6-l10n-tools \
            libsqlite3-dev libpulse-dev libxkbcommon-dev libxkbregistry-dev \
            libedataserver1.2-dev libecal2.0-dev \
            libwayland-dev wayland-protocols \
            libxcb1-dev libxcb-ewmh-dev libxcb-xkb-dev libxcb-screensaver0-dev \
            libwireplumber-0.5-dev libpipewire-0.3-dev libpam0g-dev libaudit-dev \
            dbus fonts-dejavu-core

      - uses: actions/checkout@v4
        with:
          submodules: true # the CSS engine is vendored at vendor/qml-css-engine

      # Every feature explicitly enabled: with 'auto', a missing dependency would
      # silently drop the feature and the build would go green without it.
      - name: Configure
        run: >
          meson setup build
          -Dx11=enabled -Dwayland=enabled -Dlockscreen=enabled
          -Dwireplumber=enabled -Dprivacy=enabled

      - name: Build
        run: ninja -C build

      # Offscreen platform + a private session bus: the QML applet tests need a
      # QPA platform and some models touch D-Bus.
      - name: Test
        run: dbus-run-session -- meson test -C build --print-errorlogs
        env:
          QT_QPA_PLATFORM: offscreen
